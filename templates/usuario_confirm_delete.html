{% extends 'base.html' %}

{% block title %}Excluir usuario{% endblock %}

{% block content %}
<h1>Excluir usuario</h1>
<p>Tem certeza que deseja excluir o usuario <strong>{{ usuario_obj.username }}</strong>?</p>

<form method="post" class="action-row">
    {% csrf_token %}
    <button type="submit" class="danger">
        <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        <span class="btn-text">Excluir</span>
    </button>
    <a class="btn secundario" href="{% url 'usuarios-lista' %}">
        <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
        <span class="btn-text">Cancelar</span>
    </a>
</form>
{% endblock %}
