{% extends 'base.html' %}

{% block title %}{% if object %}Editar contato{% else %}Novo contato{% endif %}{% endblock %}

{% block content %}
<h1>{% if object %}Editar primeiro contato{% else %}Novo primeiro contato{% endif %}</h1>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <p class="action-row">
        <button type="submit">
            <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            <span class="btn-text">Salvar</span>
        </button>
        <a class="btn secundario" href="{% url 'pessoas-lista' %}">
            <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            <span class="btn-text">Cancelar</span>
        </a>
    </p>
</form>
{% endblock %}
