{% extends 'base.html' %}

{% block title %}Auto cadastro{% endblock %}

{% block content %}
<section class="forbidden-wrap">
    <div class="forbidden-card">
        <p class="forbidden-code">PIBVP</p>
        <h1>Auto cadastro de acolhimento</h1>
        <p class="forbidden-text">Preencha seus dados para que nossa equipe entre em contato com voce.</p>

        <form method="post" class="stack-form">
            {% csrf_token %}
            {{ form.as_p }}
            <p class="action-row">
                <button type="submit">
                    <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                    <span class="btn-text">Enviar cadastro</span>
                </button>
            </p>
        </form>
    </div>
</section>
{% endblock %}
